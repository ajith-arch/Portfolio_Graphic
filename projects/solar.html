<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar tracker | Ajith Alphonse</title>
  <link rel="icon" type="image/jpeg" href="../assets/profile.jpg">
  <link rel="stylesheet" href="solar.css">
</head>
<body class="solar-case">
  <header class="solar-top">
    <a class="solar-back" href="../index.html#work">← Work</a>
    <span class="solar-title">Solar tracker</span>
  </header>

  <div class="solar-stage">
    <main id="solarGallery" class="solar-work" aria-label="Solar tracker case study media">
      <div class="solar-column solar-column--strip">
        <div id="solarStripBefore" class="sequential-media"></div>
      </div>
      <div class="solar-column solar-column--strip">
        <div
          id="solarStripMid"
          class="sequential-media"
          aria-label="Solar frames eight through fourteen"
        ></div>
      </div>
      <div class="solar-column solar-column--strip">
        <div id="solarStripAfter" class="sequential-media"></div>
      </div>
    </main>
  </div>

  <!-- Manifest: `node scripts/generate-solar-manifest.mjs` — optional ?manifest=../assets/assest/manifest.json -->
  <script src="../js/sequential-media-gallery.js"></script>
  <script src="solar-init.js"></script>
