<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="OnePlus wearables branding for Utah Campus Store PDP preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0f"/>
      <stop offset="45%" style="stop-color:#1a1a1e"/>
      <stop offset="100%" style="stop-color:#111113"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8112D"/>
      <stop offset="100%" style="stop-color:#9B0E1F"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="12" height="900" fill="url(#accent)"/>
  <rect x="96" y="88" width="1408" height="724" rx="28" fill="#fafafa" opacity="0.04" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="140" y="168" fill="rgba(255,255,255,0.45)" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="600" letter-spacing="0.2em">CAMPUS STORE</text>
  <text x="140" y="218" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="600" letter-spacing="-0.02em">Wearables &#183; Earbuds &#183; Tech</text>
  <rect x="140" y="268" width="520" height="8" rx="4" fill="#E8112D" opacity="0.85"/>
  <!-- PDP-style product stage -->
  <rect x="820" y="200" width="620" height="520" rx="20" fill="#0c0c0e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <ellipse cx="1130" cy="420" rx="140" ry="44" fill="rgba(255,255,255,0.06)"/>
  <!-- Stylized earbuds (generic shapes, not trademark art) -->
  <circle cx="1040" cy="380" r="52" fill="#2a2a2e" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="1220" cy="380" r="52" fill="#2a2a2e" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <rect x="1008" y="388" width="64" height="18" rx="9" fill="#E8112D" opacity="0.9"/>
  <rect x="1188" y="388" width="64" height="18" rx="9" fill="#E8112D" opacity="0.9"/>
  <path d="M1092 428 Q1130 468 1168 428" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-linecap="round"/>
  <!-- Packaging hint -->
  <rect x="140" y="340" width="280" height="360" rx="12" fill="#ffffff" opacity="0.07" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="168" y="372" width="224" height="16" rx="4" fill="rgba(232,17,45,0.35)"/>
  <rect x="168" y="412" width="180" height="10" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="168" y="436" width="200" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="168" y="460" width="160" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>
  <text x="168" y="640" fill="rgba(255,255,255,0.35)" font-family="system-ui,-apple-system,sans-serif" font-size="14" letter-spacing="0.12em">PRODUCT BRANDING ť PDP</text>
</svg>
